<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Nike × 淘宝 AI配色 V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC',sans-serif;font-weight:300}
canvas#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.nike-logo{font-family:'Futura','Trebuchet MS','Arial Black',sans-serif;font-weight:900;font-style:italic;letter-spacing:6px;text-transform:uppercase}

/* ===== SPLASH ===== */
#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;transition:opacity .6s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash .nike-logo{font-size:42px;animation:splashFadeUp .8s ease both}
#splash .subtitle{font-size:11px;letter-spacing:4px;opacity:.5;margin-top:6px;animation:splashFadeUp .8s .15s ease both}
#splash .shoe-wrap{position:relative;margin:40px 0 20px}
#splash .shoe-glow{position:absolute;width:260px;height:80px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,154,86,.35),transparent 70%);bottom:-20px;left:50%;transform:translateX(-50%);filter:blur(20px);animation:splashGlowIn 1.2s .4s ease both}
#splash .shoe-img{width:280px;height:auto;display:block;animation:splashShoeIn 1s .3s cubic-bezier(.4,0,.2,1) both}
#splash .tagline{font-size:15px;letter-spacing:3px;font-weight:300;opacity:0;animation:splashFadeUp .8s .6s ease both}
#splash .cta{margin-top:32px;padding:14px 48px;border:1px solid rgba(255,255,255,.3);border-radius:40px;background:transparent;color:#fff;font-size:14px;letter-spacing:6px;cursor:pointer;position:relative;overflow:hidden;opacity:0;animation:splashFadeUp .8s .8s ease both;font-weight:300;font-family:inherit}
#splash .cta::after{content:'';position:absolute;inset:-2px;border-radius:40px;border:1px solid rgba(255,255,255,.15);animation:splashCtaPulse 2s 1.2s infinite}
#splash .footer{position:absolute;bottom:28px;font-size:10px;letter-spacing:2px;opacity:.3}

/* ===== MAIN ===== */
#main{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;opacity:0;pointer-events:none;transition:opacity .5s ease .3s;overflow-y:auto;-webkit-overflow-scrolling:touch}
#main.show{opacity:1;pointer-events:auto}
.main-inner{width:100%;max-width:320px;display:flex;flex-direction:column;align-items:center;padding:24px 0 32px;min-height:100%}
.main-logo{font-size:42px;margin-top:12px}
.main-subtitle{font-size:11px;letter-spacing:4px;opacity:.5;margin-top:4px}

/* Shoe area */
.shoe-area{position:relative;width:280px;height:280px;margin:24px auto 0;perspective:1000px;flex-shrink:0}
.shoe-3d{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .15s ease-out;will-change:transform}
.shoe-3d img{width:100%;height:auto;animation:shoeFloat 3s ease-in-out infinite;transition:opacity .6s cubic-bezier(.4,0,.2,1),filter .6s ease,transform .5s cubic-bezier(.34,1.56,.64,1)}
.shoe-3d img.dimmed{filter:grayscale(1) brightness(.7);opacity:.45}
.shoe-3d img.revealed{filter:none;opacity:1}
.shoe-3d img.shoe-pop{animation:shoePop .6s cubic-bezier(.34,1.56,.64,1) forwards,shoeFloat 3s 0.6s ease-in-out infinite}
.shoe-glow-circle{position:absolute;width:200px;height:60px;border-radius:50%;bottom:30px;left:50%;transform:translateX(-50%);filter:blur(25px);opacity:0;transition:opacity .6s ease,background .6s ease}
.shoe-glow-circle.visible{opacity:.6}
.flash-burst{position:absolute;top:50%;left:50%;width:100px;height:100px;margin:-50px 0 0 -50px;border-radius:50%;background:#fff;opacity:0;transform:scale(0);pointer-events:none}
.flash-burst.burst{animation:flashBurst .6s ease-out forwards}

/* Time display */
.time-display{font-size:16px;letter-spacing:2px;opacity:.7;margin-top:16px;transition:opacity .4s}
.tagline-main{font-size:14px;letter-spacing:3px;opacity:.5;margin-top:6px;font-weight:300}

/* Input controls */
.input-controls{width:100%;margin-top:24px;transition:opacity .4s ease,transform .4s ease}
.input-controls.hidden{opacity:0;transform:translateY(-16px);pointer-events:none;position:absolute;visibility:hidden}
.weather-label{font-size:11px;letter-spacing:5px;opacity:.4;text-align:center;margin-bottom:14px}
.weather-grid{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.weather-btn{width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fff;font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .25s ease;font-family:inherit}
.weather-btn .wb-emoji{font-size:18px;line-height:1}
.weather-btn .wb-label{font-size:9px;letter-spacing:1px;opacity:.6}
.weather-btn.active{border-color:#fff;transform:scale(1.1);background:rgba(255,255,255,.08)}
.generate-btn{width:100%;padding:14px 0;border:1px solid rgba(255,255,255,.3);border-radius:40px;background:transparent;color:#fff;font-size:13px;letter-spacing:5px;cursor:pointer;margin-top:22px;font-family:inherit;font-weight:300;transition:all .3s ease}
.generate-btn:active{background:rgba(255,255,255,.08)}
.generate-btn.loading{pointer-events:none;opacity:.7}

/* Result info */
.result-info{width:100%;text-align:center;opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease;pointer-events:none}
.result-info.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.result-colors{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.result-colors .rc-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.15);transform:scale(0);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.result-colors .rc-dot.pop{transform:scale(1)}
.result-name{font-size:24px;letter-spacing:4px;font-weight:300}
.result-desc{font-size:13px;opacity:.5;margin-top:4px;letter-spacing:1px}
.result-time{font-size:11px;opacity:.4;margin-top:10px;letter-spacing:1px}
.result-btns{display:flex;gap:14px;justify-content:center;margin-top:22px}
.result-btns button{padding:12px 32px;border-radius:30px;font-size:12px;letter-spacing:3px;cursor:pointer;font-family:inherit;font-weight:300;transition:all .3s ease}
.btn-retry{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-retry:active{background:rgba(255,255,255,.08)}
.btn-share{background:#fff;color:#0a0a0a;border:none}
.btn-share:active{opacity:.85}

.main-footer{font-size:10px;letter-spacing:2px;opacity:.25;margin-top:auto;padding-top:24px;padding-bottom:20px}

/* ===== ANIMATIONS ===== */
@keyframes shoeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shoePop{0%{transform:scale(.9)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes splashFadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes splashGlowIn{from{opacity:0;transform:translateX(-50%) scale(.5)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes splashShoeIn{from{opacity:0;transform:scale(.7) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes splashCtaPulse{0%,100%{opacity:0;transform:scale(1)}50%{opacity:.4;transform:scale(1.08)}}
@keyframes flashBurst{0%{transform:scale(0);opacity:.6}100%{transform:scale(3);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPop{from{transform:scale(0)}to{transform:scale(1)}}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="nike-logo">NIKE</div>
  <div class="subtitle">AIR FORCE 1 · YOUR MOMENT</div>
  <div class="shoe-wrap">
    <div class="shoe-glow" id="splashGlow"></div>
    <img class="shoe-img" id="splashShoeImg" src="" alt="Nike AF1">
  </div>
  <div class="tagline">每个此刻，都是限定</div>
  <button class="cta" id="splashCta">留 住 此 刻</button>
  <div class="footer">Nike × 淘宝 · AI 限定配色</div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="main-inner">
    <div class="nike-logo main-logo">NIKE</div>
    <div class="main-subtitle">AIR FORCE 1 · YOUR MOMENT</div>

    <div class="shoe-area" id="shoeArea">
      <div class="shoe-glow-circle" id="shoeGlow"></div>
      <div class="flash-burst" id="flashBurst"></div>
      <div class="shoe-3d" id="shoe3d">
        <img id="shoeImg" src="" alt="Nike AF1" class="dimmed">
      </div>
    </div>

    <div class="time-display" id="timeDisplay"></div>
    <div class="tagline-main">每个此刻，都是限定</div>

    <!-- Input controls -->
    <div class="input-controls" id="inputControls">
      <div class="weather-label">此 刻 天 气</div>
      <div class="weather-grid" id="weatherGrid"></div>
      <button class="generate-btn" id="generateBtn">生 成 我 的 专 属 配 色</button>
    </div>

    <!-- Result info (hidden initially) -->
    <div class="result-info" id="resultInfo">
      <div class="result-colors" id="resultColors"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-time" id="resultTime"></div>
      <div class="result-btns">
        <button class="btn-retry" id="btnRetry">再 来 一 次</button>
        <button class="btn-share" id="btnShare">分 享 配 色</button>
      </div>
    </div>

    <div class="main-footer">Nike × 淘宝 · AI 限定配色</div>
  </div>
</div>

<script>
/* ===== DATA ===== */
const PRESETS = [
  {time:'清晨',weather:'晴',emoji:'☀️',name:'破晓金橘',desc:'第一缕阳光穿透薄雾的温柔',img:'nike-generated/01_清晨_晴_nanabana.jpg',colors:['#FF9A56','#FFD4A0','#FFF0DB','#A0D2DB','#5B8FA8']},
  {time:'清晨',weather:'雾',emoji:'🌫️',name:'雾中花径',desc:'露珠折射出的朦胧色谱',img:'nike-generated/02_清晨_雾_nanabana.jpg',colors:['#C8D5BB','#E8E4D9','#F5F0E8','#B8C5D6','#8FA4B8']},
  {time:'上午',weather:'晴',emoji:'☀️',name:'日光倾城',desc:'阳光洒满街道的明朗时刻',img:'nike-generated/03_上午_晴_nanabana.jpg',colors:['#FFB347','#FFD700','#FFF8DC','#87CEEB','#4A90D9']},
  {time:'上午',weather:'雨',emoji:'🌧️',name:'晨雨初歇',desc:'雨后空气里弥漫的青草气息',img:'nike-generated/04_上午_雨_nanabana.jpg',colors:['#7BAE7F','#A8CCB0','#D4E6D4','#8AAFC8','#5C8BA0']},
  {time:'午后',weather:'多云',emoji:'⛅',name:'浮云半日',desc:'云影在地面缓缓移动的慵懒',img:'nike-generated/05_午后_多云_nanabana.jpg',colors:['#C4B7A6','#D9CFC1','#EDE8E0','#A89F91','#8B8178']},
  {time:'傍晚',weather:'晴',emoji:'🌅',name:'落日熔金',desc:'天边燃烧的最后一抹霞光',img:'nike-generated/06_傍晚_晴_nanabana.jpg',colors:['#FF6B35','#FF8C42','#FFB366','#E84545','#C62828']},
  {time:'傍晚',weather:'雨',emoji:'🌧️',name:'暮雨潇潇',desc:'黄昏细雨中霓虹初上的街头',img:'nike-generated/07_傍晚_雨_nanabana.jpg',colors:['#6B5B7B','#8E7BA4','#B8A9C9','#D4C5E2','#5C4D6D']},
  {time:'夜晚',weather:'晴',emoji:'🌙',name:'星河入梦',desc:'万家灯火与星空交相辉映',img:'nike-generated/08_夜晚_晴_nanabana.jpg',colors:['#1A237E','#283593','#3949AB','#FFD54F','#FF8F00']},
  {time:'夜晚',weather:'雪',emoji:'❄️',name:'雪夜极光',desc:'飘雪中城市灯光晕染的梦幻',img:'nike-generated/09_夜晚_雪_nanabana.jpg',colors:['#E8EAF6','#C5CAE9','#9FA8DA','#7986CB','#5C6BC0']},
  {time:'深夜',weather:'雾',emoji:'🌫️',name:'迷雾深渊',desc:'浓雾中只剩下呼吸与心跳',img:'nike-generated/10_深夜_雾_nanabana.jpg',colors:['#2D2D2D','#3D3D3D','#4D4D4D','#6D6D6D','#8D8D8D']}
];

const WEATHERS = [
  {emoji:'☀️',label:'晴'},
  {emoji:'⛅',label:'多云'},
  {emoji:'🌧️',label:'雨'},
  {emoji:'❄️',label:'雪'},
  {emoji:'💨',label:'风'},
  {emoji:'🌫️',label:'雾'}
];

/* ===== TIME DETECTION ===== */
function getTimePeriod(){
  const h=new Date().getHours();
  if(h>=5&&h<8) return '清晨';
  if(h>=8&&h<12) return '上午';
  if(h>=12&&h<17) return '午后';
  if(h>=17&&h<19) return '傍晚';
  if(h>=19&&h<23) return '夜晚';
  return '深夜';
}

function getTimeString(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  return hh+':'+mm;
}

function findPreset(timePeriod,weather){
  // 1. 精确匹配：同时间+同天气
  let p=PRESETS.find(x=>x.time===timePeriod&&x.weather===weather);
  // 2. 同天气，其他时段（优先相邻时段）
  if(!p) p=PRESETS.find(x=>x.weather===weather);
  // 3. 同时段，任意天气
  if(!p) p=PRESETS.find(x=>x.time===timePeriod);
  // 4. 兜底
  if(!p) p=PRESETS[0];
  return p;
}

/* ===== PARTICLE SYSTEM ===== */
const cvs=document.getElementById('particleCanvas');
const ctx=cvs.getContext('2d');
let particles=[];
let targetParticleColor={r:255,g:255,b:255};

function resizeCanvas(){cvs.width=window.innerWidth;cvs.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}

function initParticles(){
  particles=[];
  for(let i=0;i<30;i++){
    particles.push({
      x:Math.random()*cvs.width,
      y:cvs.height+Math.random()*100,
      r:Math.random()*2+1,
      speed:Math.random()*.6+.2,
      drift:Math.random()*.4-.2,
      color:{r:255,g:255,b:255},
      alpha:Math.random()*.4+.1
    });
  }
}

function animateParticles(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  particles.forEach(p=>{
    p.y-=p.speed;
    p.x+=p.drift+Math.sin(p.y*.01)*.3;
    if(p.y<-10){p.y=cvs.height+10;p.x=Math.random()*cvs.width}
    p.color.r+=(targetParticleColor.r-p.color.r)*.02;
    p.color.g+=(targetParticleColor.g-p.color.g)*.02;
    p.color.b+=(targetParticleColor.b-p.color.b)*.02;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba('+Math.round(p.color.r)+','+Math.round(p.color.g)+','+Math.round(p.color.b)+','+p.alpha+')';
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
initParticles();
animateParticles();

/* ===== STATE ===== */
const timePeriod=getTimePeriod();
let selectedWeather=null;
let isResultShown=false;
let currentPreset=null;

/* ===== DOM REFS ===== */
const splashEl=document.getElementById('splash');
const mainEl=document.getElementById('main');
const shoeImg=document.getElementById('shoeImg');
const shoe3d=document.getElementById('shoe3d');
const shoeArea=document.getElementById('shoeArea');
const shoeGlow=document.getElementById('shoeGlow');
const flashBurst=document.getElementById('flashBurst');
const timeDisplay=document.getElementById('timeDisplay');
const inputControls=document.getElementById('inputControls');
const weatherGrid=document.getElementById('weatherGrid');
const generateBtn=document.getElementById('generateBtn');
const resultInfo=document.getElementById('resultInfo');
const resultColors=document.getElementById('resultColors');
const resultName=document.getElementById('resultName');
const resultDesc=document.getElementById('resultDesc');
const resultTime=document.getElementById('resultTime');

/* ===== SPLASH INIT ===== */
const splashPreset=PRESETS.find(x=>x.time===timePeriod)||PRESETS[0];
document.getElementById('splashShoeImg').src=splashPreset.img;
document.getElementById('splashGlow').style.background='radial-gradient(ellipse,'+splashPreset.colors[0]+'55,transparent 70%)';

/* ===== SPLASH → MAIN ===== */
document.getElementById('splashCta').addEventListener('click',function(){
  splashEl.classList.add('hide');
  setTimeout(function(){
    splashEl.style.display='none';
    mainEl.classList.add('show');
    initMain();
  },600);
});

/* ===== INIT MAIN ===== */
function initMain(){
  // Time display
  timeDisplay.textContent=timePeriod+' · '+getTimeString();

  // Default shoe: first preset matching current time, dimmed
  const defaultPreset=PRESETS.find(x=>x.time===timePeriod)||PRESETS[0];
  shoeImg.src=defaultPreset.img;
  shoeImg.classList.add('dimmed');
  shoeImg.classList.remove('revealed','shoe-pop');

  // Build weather buttons
  weatherGrid.innerHTML='';
  WEATHERS.forEach(function(w){
    const btn=document.createElement('button');
    btn.className='weather-btn';
    btn.innerHTML='<span class="wb-emoji">'+w.emoji+'</span><span class="wb-label">'+w.label+'</span>';
    btn.addEventListener('click',function(){
      selectedWeather=w.label;
      weatherGrid.querySelectorAll('.weather-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
    });
    weatherGrid.appendChild(btn);
  });
}

/* ===== GENERATE ===== */
generateBtn.addEventListener('click',function(){
  if(!selectedWeather){
    // Subtle shake if no weather selected
    generateBtn.style.transform='translateX(-4px)';
    setTimeout(function(){generateBtn.style.transform='translateX(4px)'},80);
    setTimeout(function(){generateBtn.style.transform='translateX(-2px)'},160);
    setTimeout(function(){generateBtn.style.transform='translateX(0)'},240);
    return;
  }

  // Find matching preset
  currentPreset=findPreset(timePeriod,selectedWeather);

  // Loading state
  generateBtn.classList.add('loading');
  generateBtn.textContent='AI 正在捕捉此刻...';

  // Preload the result image
  const preloadImg=new Image();
  preloadImg.src=currentPreset.img;

  setTimeout(function(){
    // Hide input controls
    inputControls.classList.add('hidden');

    // Update shoe image to the matched preset
    shoeImg.src=currentPreset.img;

    // Shoe reveal: grayscale → full color with pop
    shoeImg.classList.remove('dimmed');
    shoeImg.classList.add('revealed');
    // Force reflow then pop
    void shoeImg.offsetWidth;
    shoeImg.classList.add('shoe-pop');

    // Flash burst behind shoe
    flashBurst.classList.remove('burst');
    void flashBurst.offsetWidth;
    flashBurst.classList.add('burst');

    // Show glow circle
    shoeGlow.style.background='radial-gradient(ellipse,'+currentPreset.colors[0]+'66,transparent 70%)';
    shoeGlow.classList.add('visible');

    // Background gradient
    document.body.style.background='radial-gradient(ellipse at 50% 40%,'+currentPreset.colors[4]+'22,#0a0a0a 70%)';

    // Particle color
    targetParticleColor=hexToRgb(currentPreset.colors[0]);

    // Build result color dots
    resultColors.innerHTML='';
    currentPreset.colors.forEach(function(c,i){
      const dot=document.createElement('div');
      dot.className='rc-dot';
      dot.style.background=c;
      resultColors.appendChild(dot);
      setTimeout(function(){dot.classList.add('pop')},200+i*80);
    });

    // Result text
    resultName.textContent=currentPreset.name;
    resultDesc.textContent=currentPreset.desc;
    resultTime.textContent=timePeriod+' · '+getTimeString()+' · '+currentPreset.emoji+' '+currentPreset.weather;

    // Show result info
    setTimeout(function(){
      resultInfo.classList.add('visible');
    },150);

    isResultShown=true;

    // Reset button
    generateBtn.classList.remove('loading');
    generateBtn.textContent='生 成 我 的 专 属 配 色';
  },1500);
});

/* ===== RETRY ===== */
document.getElementById('btnRetry').addEventListener('click',function(){
  isResultShown=false;
  currentPreset=null;
  selectedWeather=null;

  // Hide result
  resultInfo.classList.remove('visible');

  // Reset shoe to dimmed
  shoeImg.classList.remove('revealed','shoe-pop');
  shoeImg.classList.add('dimmed');
  const defaultPreset=PRESETS.find(function(x){return x.time===timePeriod})||PRESETS[0];
  shoeImg.src=defaultPreset.img;

  // Hide glow
  shoeGlow.classList.remove('visible');

  // Reset background
  document.body.style.background='#0a0a0a';

  // Reset particles to white
  targetParticleColor={r:255,g:255,b:255};

  // Show input controls
  inputControls.classList.remove('hidden');

  // Clear weather selection
  weatherGrid.querySelectorAll('.weather-btn').forEach(function(b){b.classList.remove('active')});

  // Reset 3D transform
  shoe3d.style.transform='rotateY(0) rotateX(0)';
});

/* ===== SHARE ===== */
document.getElementById('btnShare').addEventListener('click',function(){
  if(!currentPreset) return;
  var text='Nike AF1 AI限定配色「'+currentPreset.name+'」\n'+currentPreset.desc+'\n配色：'+currentPreset.colors.join(' ')+'\n'+timePeriod+' '+currentPreset.emoji+' '+currentPreset.weather+'\n#Nike #AI配色 #淘宝';
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      var btn=document.getElementById('btnShare');
      btn.textContent='已 复 制';
      setTimeout(function(){btn.textContent='分 享 配 色'},1500);
    });
  }
});

/* ===== 3D PARALLAX (result only) ===== */
shoeArea.addEventListener('mousemove',function(e){
  if(!isResultShown) return;
  var rect=shoeArea.getBoundingClientRect();
  var x=(e.clientX-rect.left)/rect.width-.5;
  var y=(e.clientY-rect.top)/rect.height-.5;
  shoe3d.style.transform='rotateY('+x*30+'deg) rotateX('+-y*30+'deg)';
});
shoeArea.addEventListener('mouseleave',function(){
  shoe3d.style.transform='rotateY(0) rotateX(0)';
});

// Mobile device orientation parallax
if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation',function(e){
    if(!isResultShown||e.gamma===null) return;
    var x=Math.max(-15,Math.min(15,e.gamma))/15;
    var y=Math.max(-15,Math.min(15,e.beta-45))/15;
    shoe3d.style.transform='rotateY('+x*15+'deg) rotateX('+-y*15+'deg)';
  });
}

/* ===== PRELOAD ALL IMAGES ===== */
PRESETS.forEach(function(p){var img=new Image();img.src=p.img});
